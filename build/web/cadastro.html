<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de HQ</title>
    <link rel="stylesheet" href="CSS/style.css">
    <script src="JS/validacao.js" defer></script>
</head>
<body>
    <header>
        <h1>Cadastro de HQ</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="listagem.html">Listar HQs</a>
        </nav>
    </header>
    <main>
        <form onsubmit="return cadastrarHQ()">
            <label for="titulo">Título:</label>
            <input type="text" id="titulo" name="titulo" required>
            
            <label for="autor">Autor:</label>
            <input type="text" id="autor" name="autor" required>
            
            <label for="ano">Ano:</label>
            <input type="number" id="ano" name="ano" required>
            
            <label for="numeracao">Numeração:</label>
            <input type="number" id="numeracao" name="numeracao" required>
            
            <button type="submit">Cadastrar</button>
        </form>
    </main>
    <footer>
        <p>© 2024 Sistema de HQs. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
